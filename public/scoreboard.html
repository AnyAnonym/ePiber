<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scoreboard</title>
  <link rel="stylesheet" href="./CSS/styles.css" />
</head>
<body class="scoreboard-body">
  <div id="platz1">
    <div class="platz-header">Platz 1</div>
    <div class="platz-sub">Datum - Bewerb</div>
    <div class="platz-row"><span class="platz-cell label">Heim</span><div class="platz-scores"><span class="platz-cell">Satz 1</span><span class="platz-cell">Satz 2</span><span class="platz-cell">Satz 3</span><span class="platz-cell">Punkte</span></div></div>
    <div class="platz-row"><span class="platz-cell label">Gast</span><div class="platz-scores"><span class="platz-cell">Satz 1</span><span class="platz-cell">Satz 2</span><span class="platz-cell">Satz 3</span><span class="platz-cell">Punkte</span></div></div>
  </div>
  <div id="platz2">
    <div class="platz-header">Platz 2</div>
    <div class="platz-sub">Datum - Bewerb</div>
    <div class="platz-row"><span class="platz-cell label">Heim</span><div class="platz-scores"><span class="platz-cell">Satz 1</span><span class="platz-cell">Satz 2</span><span class="platz-cell">Satz 3</span><span class="platz-cell">Punkte</span></div></div>
    <div class="platz-row"><span class="platz-cell label">Gast</span><div class="platz-scores"><span class="platz-cell">Satz 1</span><span class="platz-cell">Satz 2</span><span class="platz-cell">Satz 3</span><span class="platz-cell">Punkte</span></div></div>
  </div>
  <div id="rechts">
    <div id="nächste">Nächste Spiele</div>
    <div class="rechts-line"></div>
    <div id="letzte">Letzte Spiele</div>
  </div>
</body>
</html>
