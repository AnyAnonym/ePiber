<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scoreboard</title>
  <link rel="stylesheet" href="./CSS/styles.css" />
</head>
<body class="scoreboard-body">
  <div id="platz1">
    <div class="platz-header">Platz 1</div>
    <div class="platz-sub">Datum - Bewerb</div>
    <div class="platz-row"><span class="platz-cell label" id="p1-name-h">Heim</span><div class="platz-scores"><span class="platz-cell" id="p1-h-s1">Satz 1</span><span class="platz-cell" id="p1-h-s2">Satz 2</span><span class="platz-cell" id="p1-h-s3">Satz 3</span><span class="platz-cell" id="p1-h-p">Punkte</span></div></div>
    <div class="platz-row"><span class="platz-cell label" id="p1-name-g">Gast</span><div class="platz-scores"><span class="platz-cell" id="p1-g-s1">Satz 1</span><span class="platz-cell" id="p1-g-s2">Satz 2</span><span class="platz-cell" id="p1-g-s3">Satz 3</span><span class="platz-cell" id="p1-g-p">Punkte</span></div></div>
  </div>
  <div id="platz2">
    <div class="platz-header">Platz 2</div>
    <div class="platz-sub">Datum - Bewerb</div>
    <div class="platz-row"><span class="platz-cell label" id="p2-name-h">Heim</span><div class="platz-scores"><span class="platz-cell" id="p2-h-s1">Satz 1</span><span class="platz-cell" id="p2-h-s2">Satz 2</span><span class="platz-cell" id="p2-h-s3">Satz 3</span><span class="platz-cell" id="p2-h-p">Punkte</span></div></div>
    <div class="platz-row"><span class="platz-cell label" id="p2-name-g">Gast</span><div class="platz-scores"><span class="platz-cell" id="p2-g-s1">Satz 1</span><span class="platz-cell" id="p2-g-s2">Satz 2</span><span class="platz-cell" id="p2-g-s3">Satz 3</span><span class="platz-cell" id="p2-g-p">Punkte</span></div></div>
  </div>
  <div id="rechts">
    <div id="nächste">Nächste Spiele</div>
    <div class="rechts-line"></div>
    <div id="letzte">Letzte Spiele</div>
  </div>
  <script src="./JS/scoreboardPolling.js"></script>
</body>
</html>
